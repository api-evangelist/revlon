aid: revlon
name: Revlon
kind: company
description: >-
  Revlon is a global beauty company whose portfolio spans color cosmetics,
  fragrance, skin care, hair color, hair care, beauty tools, and antiperspirants
  / deodorants. The company markets Revlon, Elizabeth Arden, Almay, Mitchum,
  Cutex, Charlie, SinfulColors, and Ultima II, along with a portfolio of
  licensed prestige and celebrity fragrance brands. Revlon Consumer Products
  Corporation filed for Chapter 11 bankruptcy protection in the Southern
  District of New York on June 15, 2022 and emerged on May 2, 2023 as a
  privately held company controlled by its former lenders (including BrandCo
  noteholders such as King Street Capital, Glendon Capital, and Angelo
  Gordon), having cut roughly $2.7 billion of debt from its balance sheet.
  Today Revlon operates as a private company with reduced leverage, selling
  through mass-market retail and prestige channels worldwide. Revlon does not
  publish a public developer API; supplier, retailer, and partner integrations
  occur through private commercial channels (e-commerce platform integrations,
  EDI / GDSN feeds for retailers, and the corporate procurement portal).
